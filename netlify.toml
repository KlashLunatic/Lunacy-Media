[build]
  command = "pnpm install && pnpm build"
  functions = "dist"
  publish = "dist/client"

[dev]
  command = "pnpm dev"
  port = 3000

[[redirects]]
  from = "/api/trpc/*"
  to = "/.netlify/functions/server/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "pnpm install && pnpm build"

[context.deploy-preview]
  command = "pnpm install && pnpm build"

[context.branch-deploy]
  command = "pnpm install && pnpm build"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/dist/client/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
